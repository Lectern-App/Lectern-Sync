name: Build & Deploy Sync Tool

on:
  push:
    branches: [main]
    paths:
      - 'sync-tool/**'
      - '.github/workflows/sync-tool.yml'
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        working-directory: sync-tool
        run: gradle build --no-daemon

      - name: Locate jar
        id: jar
        run: |
          JAR_PATH=$(find sync-tool/build/libs -name "*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::No jar produced"
            exit 1
          fi
          echo "path=$JAR_PATH" >> $GITHUB_OUTPUT
          echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload to relay
        env:
          RELAY_SECRET: ${{ secrets.RELAY_SECRET }}
          RELAY_URL: ${{ vars.RELAY_URL || 'https://relay.thelectern.app' }}
        run: |
          curl -fsS -X PUT "$RELAY_URL/static/lectern-sync.jar" \
            -H "Authorization: Bearer $RELAY_SECRET" \
            -H "X-Sync-Version: ${{ steps.jar.outputs.version }}" \
            -H "Content-Type: application/java-archive" \
            --data-binary "@${{ steps.jar.outputs.path }}"

      - name: Verify version endpoint
        env:
          RELAY_URL: ${{ vars.RELAY_URL || 'https://relay.thelectern.app' }}
        run: |
          curl -fsS "$RELAY_URL/static/lectern-sync.jar/version" | tee version.json
