name: Build & Deploy Sync Updater

on:
  push:
    branches: [main]
    paths:
      - 'sync-updater/**'
      - '.github/workflows/sync-updater.yml'
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Gradle 9+ requires JDK 17+ to run. The build targets Java 8
          # bytecode via options.release = 8 in build.gradle.
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        working-directory: sync-updater
        run: gradle build --no-daemon

      - name: Locate jar
        id: jar
        run: |
          JAR_PATH=$(find sync-updater/build/libs -name "lectern-sync-updater.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::No jar produced"
            exit 1
          fi
          echo "path=$JAR_PATH" >> $GITHUB_OUTPUT
          echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload to relay
        env:
          UPLOAD_SECRET: ${{ secrets.STATIC_UPLOAD_SECRET }}
          RELAY_URL: ${{ vars.RELAY_URL || 'https://relay.thelectern.app' }}
        run: |
          curl -fsS -X PUT "$RELAY_URL/static/lectern-sync-updater.jar" \
            -H "Authorization: Bearer $UPLOAD_SECRET" \
            -H "X-Sync-Version: ${{ steps.jar.outputs.version }}" \
            -H "Content-Type: application/java-archive" \
            --data-binary "@${{ steps.jar.outputs.path }}"
